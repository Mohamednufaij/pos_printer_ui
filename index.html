<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POS Printer Bridge Tester</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="container">
    <h1>POS Printer Bridge Tester</h1>
    <p class="sub">
      Use this page to test your local bridge (`http://localhost:5000`) from a hosted web app.
    </p>

    <section class="card">
      <h2>Bridge Settings</h2>
      <div class="grid">
        <label>
          Bridge Base URL
          <input id="baseUrl" type="text" value="http://localhost:5000" />
        </label>
        <label>
          API Key (optional)
          <input id="apiKey" type="text" placeholder="X-API-Key value" />
        </label>
      </div>
      <div class="row">
        <button id="btnStatus">GET /status</button>
        <button id="btnPrinters">GET /printers</button>
      </div>
    </section>

    <section class="card">
      <h2>Dummy Receipt</h2>
      <div class="grid">
        <label>
          Printer Name (optional)
          <input id="printer" type="text" placeholder="Leave blank to use default printer" />
        </label>
        <label>
          Store
          <input id="store" type="text" value="Vercel Test Store" />
        </label>
        <label>
          Item Name
          <input id="itemName" type="text" value="Sample Item" />
        </label>
        <label>
          Qty
          <input id="qty" type="number" step="1" min="1" value="1" />
        </label>
        <label>
          Price
          <input id="price" type="number" step="0.01" min="0" value="10.00" />
        </label>
      </div>
      <div class="row">
        <button id="btnPrint">POST /print</button>
      </div>
    </section>

    <section class="card">
      <h2>Response</h2>
      <pre id="output">{}</pre>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
